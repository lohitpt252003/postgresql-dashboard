services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: postgresql-dashboard-backend
    ports:
      - "${BACdwsdadKEND_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: postgresql-dashboard-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
